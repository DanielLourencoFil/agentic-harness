name: Audit
# Weekly dependency audit (PLAYBOOK universal CI). Fails on high+ prod advisories.
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm audit --prod --audit-level=high
